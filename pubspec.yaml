name: visionary_cash_check
description: "Aplicación de verificación de autenticación de billetes para personas con discapacidad visual."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  camera: ^0.10.5
  image_picker: ^1.0.4
  flutter_tts: ^4.2.5
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.19.0
  provider: ^6.0.0
  tflite_flutter: ^0.11.0
  image: ^4.1.0
  uuid: ^4.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/datasets/
    - assets/datasets/billetes/
    - assets/datasets/billetes/USA currency/
    - assets/datasets/billetes/USA currency/1 Dollar/
    - assets/datasets/billetes/USA currency/2 Doolar/
    - assets/datasets/billetes/USA currency/5 Dollar/
    - assets/datasets/billetes/USA currency/10 Dollar/
    - assets/datasets/billetes/USA currency/50 Dollar/
    - assets/datasets/billetes/USA currency/100 Dollar/
    - assets/datasets/billetes/USA currency/Test Set/